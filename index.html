<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sèche Été 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F9F7F3;--card:#FFF;--brd:#DDD8CF;--brdL:#EDE8E1;
  --t:#1A1A1A;--t2:#5C5650;--t3:#9B9590;
  --grn:#2E7D5A;--grnBg:#F0F8F4;--grnBrd:#B8D9CB;
  --red:#B83A2A;--redBg:#FDF2F0;--redBrd:#EAB5AC;
  --gld:#8B6914;--gldBg:#FDF8EC;--gldBrd:#DCC87A;
  --blu:#2B5EA7;--bluBg:#F0F4FB;--bluBrd:#B0C4E8;
  --f:Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;}
button{font-family:var(--f);cursor:pointer;border:none;}
#app{max-width:960px;margin:0 auto;padding-bottom:40px;}

/* HEADER */
#hdr{padding:20px 20px 14px;border-bottom:1px solid var(--brd);}
.hdr-tiny{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.hdr-h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px;}
.hdr-sub{font-size:12px;color:var(--t2);margin-bottom:14px;}
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.prog-bg{flex:1;height:3px;background:var(--brdL);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--grn),var(--blu));border-radius:2px;}
.prog-lbl{font-size:10px;color:var(--t3);white-space:nowrap;}
.stats{display:flex;gap:8px;}
.stat{flex:1;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:9px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-n{font-size:20px;font-weight:700;line-height:1;}
.stat-l{font-size:9px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}

/* TABS */
#tabs{display:flex;padding:14px 20px 0;gap:2px;border-bottom:1px solid var(--brd);}
.tbtn{flex:1;padding:8px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:12px;letter-spacing:.03em;transition:all .15s;}
.tbtn.active{color:var(--grn);border-bottom-color:var(--grn);font-weight:700;}
#content{padding:16px 20px;}

/* WEEK NAV */
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wknav-btn{background:none;border:1px solid var(--brd);border-radius:6px;width:34px;height:34px;color:var(--t2);font-size:20px;display:flex;align-items:center;justify-content:center;}
.wknav-btn:disabled{color:var(--brdL);cursor:default;}
.wknav-c{text-align:center;}
.wknav-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;}
.wknav-theme{font-size:16px;font-weight:700;letter-spacing:-.01em;margin:3px 0 2px;}
.wknav-dates{font-size:11px;color:var(--t3);}
.wk-badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;margin-left:5px;}
.wk-badge.cur{background:var(--grn);color:#fff;}
.wk-badge.past{background:var(--brdL);color:var(--t3);}
.wk-alert{background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;padding:9px 14px;margin-bottom:12px;font-size:12px;color:var(--red);}

/* CALENDAR */
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--brd);border-radius:10px;background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.05);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(106px,1fr));min-width:742px;}
.day-col{border-right:1px solid var(--brdL);min-height:220px;display:flex;flex-direction:column;transition:background .15s;}
.day-col:last-child{border-right:none;}
.day-col.drag-over{background:var(--grnBg)!important;}
.day-hdr{padding:8px 6px;background:var(--bg);border-bottom:1px solid var(--brdL);text-align:center;flex-shrink:0;}
.day-hdr-name{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);display:block;}
.day-hdr-num{font-size:17px;font-weight:700;color:var(--t2);line-height:1.2;}
.day-col.is-today .day-hdr{background:var(--grnBg);}
.day-col.is-today .day-hdr-name{color:var(--grn);}
.day-col.is-today .day-hdr-num{color:var(--grn);}
.day-body{flex:1;padding:5px;display:flex;flex-direction:column;gap:5px;}

/* SESSION BLOCKS */
.sb{border-radius:6px;padding:6px 8px;cursor:pointer;border-left:3px solid;font-size:11px;position:relative;user-select:none;transition:filter .15s;}
.sb:hover{filter:brightness(.95);}
.sb.is-done{opacity:.55;}
.sb.is-dragging{opacity:.3;}
.sb-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.85;margin-bottom:2px;}
.sb-title{font-size:11px;font-weight:700;line-height:1.25;margin-bottom:1px;}
.sb-dur{font-size:10px;opacity:.7;}
.sb-check{position:absolute;top:5px;right:6px;font-size:11px;font-weight:700;color:var(--grn);}
.sb.tp-muscu   {background:var(--grnBg);border-color:var(--grn);color:var(--grn);}
.sb.tp-velo    {background:var(--bluBg);border-color:var(--blu);color:var(--blu);}
.sb.tp-combo   {background:#FDF6F1;border-color:#7A4E2D;color:#7A4E2D;}
.sb.tp-optional{background:var(--gldBg);border-color:var(--gld);color:var(--gld);}
.sb.tp-foot    {background:#FDF4EC;border-color:#C05E1A;color:#C05E1A;}
.sb.tp-run     {background:#EBF8F8;border-color:#1A7A7A;color:#1A7A7A;}
.sb.tp-tennis  {background:#F4F0F8;border-color:#5A2E7D;color:#5A2E7D;}

.add-day-btn{margin-top:auto;padding:5px;background:none;border:1px dashed var(--brd);border-radius:5px;color:var(--t3);font-size:14px;width:100%;transition:all .15s;}
.add-day-btn:hover{border-color:var(--grn);color:var(--grn);background:var(--grnBg);}
.ecart-btn{width:100%;margin-top:12px;padding:10px;background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;color:var(--red);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0 0 12px;}
@media(min-width:600px){.overlay{align-items:center;}}
#mbox{background:#fff;border-radius:14px 14px 10px 10px;padding:22px;width:93%;max-width:490px;max-height:88vh;overflow-y:auto;border:1px solid var(--brd);}
@media(min-width:600px){#mbox{border-radius:12px;}}
.m-close{float:right;background:none;font-size:22px;color:var(--t3);margin-top:-4px;line-height:1;}
.m-title{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--t);}
.m-tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.m-sess-title{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.2;}
.m-date-row{display:flex;gap:14px;align-items:center;margin-bottom:12px;font-size:12px;color:var(--t2);}
.m-date-link{color:var(--blu);text-decoration:underline;text-decoration-style:dotted;cursor:pointer;}
.velo-blk{background:var(--bluBg);border:1px solid var(--bluBrd);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--blu);font-style:italic;margin-bottom:12px;}
.exo-list{margin:8px 0;}
.exo-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px;}
.exo-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--brdL);gap:8px;}
.exo-row.dis .exo-txt{text-decoration:line-through;opacity:.4;}
.exo-txt{flex:1;}
.exo-n{font-size:12px;font-weight:700;color:var(--t);margin-bottom:1px;}
.exo-d{font-size:11px;color:var(--t2);font-style:italic;}
.exo-tog{background:none;border:1px solid var(--brd);border-radius:5px;width:26px;height:26px;font-size:11px;color:var(--t3);flex-shrink:0;}
.exo-tog.on{border-color:var(--red);color:var(--red);}
.m-actions{display:flex;gap:8px;margin-top:16px;}
.btn-p{flex:1;padding:11px;background:var(--grn);border-radius:8px;color:#fff;font-size:13px;font-weight:700;}
.btn-s{padding:11px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--t2);font-size:13px;}
.btn-d{padding:11px;background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;color:var(--red);font-size:13px;}
.btn-done-s{background:var(--grnBg)!important;border:1px solid var(--grnBrd);color:var(--grn)!important;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0;}
.type-btn{padding:10px 5px;border-radius:8px;border:1.5px solid var(--brd);background:#fff;font-size:10px;text-align:center;cursor:pointer;transition:all .15s;line-height:1.3;}
.type-btn .ti{font-size:20px;display:block;margin-bottom:3px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0;}
.dpk{padding:7px 3px;border-radius:6px;border:1px solid var(--brd);background:#fff;font-size:9px;text-align:center;cursor:pointer;color:var(--t2);}
.dpk.sel{border-color:var(--grn);background:var(--grnBg);color:var(--grn);font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 14px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--brd);background:#fff;color:var(--t2);font-size:12px;cursor:pointer;}
.chip.sel{border-color:var(--red);background:var(--redBg);color:var(--red);}
.minp{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:7px;font-size:13px;font-family:var(--f);color:var(--t);outline:none;}
.lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;display:block;}

/* NUTRITION */
.sec-title{font-size:10px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin:18px 0 10px;}
.n-card{border-radius:9px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.65;}

/* POIDS */
.wt-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brdL);}
.wt-wk{width:60px;flex-shrink:0;}
.wt-wk-n{font-size:12px;font-weight:700;}
.wt-wk-d{font-size:10px;color:var(--t3);}
.wt-inp{width:82px;padding:7px 10px;border:1px solid var(--brd);border-radius:6px;font-size:13px;font-family:var(--f);outline:none;}
.wt-inp.cur{border-color:var(--grnBrd);background:var(--grnBg);}
.chart-wrap{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:16px 8px 8px;margin-top:20px;}
.ecart-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--brdL);font-size:12px;}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <nav id="tabs">
    <button class="tbtn" id="tbtn-plan"  onclick="switchTab('plan')">Planning</button>
    <button class="tbtn" id="tbtn-nutri" onclick="switchTab('nutri')">Nutrition</button>
    <button class="tbtn" id="tbtn-poids" onclick="switchTab('poids')">Poids</button>
  </nav>
  <div id="content">
    <div id="tab-plan"></div>
    <div id="tab-nutri" hidden></div>
    <div id="tab-poids" hidden></div>
  </div>
</div>
<div id="modal" class="overlay" hidden onclick="if(event.target===this)closeModal()">
  <div id="mbox"></div>
</div>

/* ══ HELPERS ══ */
function toYMD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(ymd){if(!ymd)return '—';const d=new Date(ymd+'T12:00:00');return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}

function getCurrentWeek(){
  const diff=Math.floor((new Date()-PROG_START)/86400000);
  if(diff<0)return 1;
  return Math.min(Math.floor(diff/7)+1,7);
}

function getWeekDates(wn){
  const start=new Date(PROG_START);
  start.setDate(start.getDate()+(wn-1)*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+i);return d;});
}

function getSD(id){return S.sessionDates[id]||DEFAULT_DATES[id]||'';}
function getAllPS(){return WEEKS.flatMap(w=>w.sessions);}
function getSessions4Date(ds){
  return [...getAllPS().filter(s=>getSD(s.id)===ds),...S.customSessions.filter(s=>s.date===ds)];
}
function findSess(id){
  if(String(id).startsWith('c_'))return S.customSessions.find(s=>s.id===id);
  return getAllPS().find(s=>s.id===id);
}
function totalPl(){return WEEKS.reduce((a,w)=>a+w.sessions.filter(s=>s.type!=='optional').length,0);}
function totalDn(){return Object.values(S.done).filter(Boolean).length;}

/* ══ DRAG & DROP ══ */
let dragId=null;

function onDS(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('is-dragging');},0);
}
function onDE(e){
  document.querySelectorAll('.sb').forEach(el=>el.classList.remove('is-dragging'));
  document.querySelectorAll('.day-col').forEach(el=>el.classList.remove('drag-over'));
}
function onDO(e,ds){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onDL(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,ds){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  moveTo(dragId,ds);dragId=null;
}
function moveTo(id,nd){
  if(String(id).startsWith('c_')){const s=S.customSessions.find(x=>x.id===id);if(s)s.date=nd;}
  else S.sessionDates[id]=nd;
  saveS();renderCal();
}

/* ══ RENDER CALENDAR ══ */
function renderCal(){
  const wk=S.currentWeek,wkD=WEEKS[wk-1],cw=getCurrentWeek(),dates=getWeekDates(wk);
  let h=`
    <div class="wknav">
      <button class="wknav-btn" onclick="chWk(-1)" ${wk<=1?'disabled':''}>&#8249;</button>
      <div class="wknav-c">
        <div class="wknav-lbl">Semaine ${wk} / 7
          ${wk===cw?'<span class="wk-badge cur">EN COURS</span>':''}
          ${wk<cw?'<span class="wk-badge past">PASSÉE</span>':''}
        </div>
        <div class="wknav-theme">${wkD.theme}</div>
        <div class="wknav-dates">${wkD.dates}</div>
      </div>
      <button class="wknav-btn" onclick="chWk(1)" ${wk>=7?'disabled':''}>&#8250;</button>
    </div>
    ${wkD.alert?`<div class="wk-alert">⚠ ${wkD.alert}</div>`:''}
    <div class="cal-scroll"><div class="cal-grid">`;

  dates.forEach(date=>{
    const ds=toYMD(date),isToday=ds===TODAY;
    const dn=date.toLocaleDateString('fr-FR',{weekday:'short'}),num=date.getDate();
    const sessions=getSessions4Date(ds);
    h+=`<div class="day-col${isToday?' is-today':''}"
      ondragover="onDO(event,'${ds}')" ondragleave="onDL(event)" ondrop="onDrop(event,'${ds}')"
      data-date="${ds}">
      <div class="day-hdr">
        <span class="day-hdr-name">${dn}</span>
        <span class="day-hdr-num">${num}</span>
      </div>
      <div class="day-body">`;
    sessions.forEach(s=>{
      const T=TYPES[s.type]||TYPES.muscu,done=!!S.done[s.id];
      h+=`<div class="sb tp-${s.type}${done?' is-done':''}"
        draggable="true"
        ondragstart="onDS(event,'${s.id}')" ondragend="onDE(event)"
        onclick="openSess('${s.id}')" data-id="${s.id}">
        <div class="sb-type">${T.icon} ${T.label}</div>
        <div class="sb-title">${s.title}</div>
        <div class="sb-dur">${s.dur||'?'} min</div>
        ${done?'<div class="sb-check">✓</div>':''}
      </div>`;
    });
    h+=`<button class="add-day-btn" onclick="openAdd('${ds}')">+</button></div></div>`;
  });

  h+=`</div></div><button class="ecart-btn" onclick="openEcart()">⚠ Signaler un écart alimentaire</button>`;
  document.getElementById('tab-plan').innerHTML=h;
}

    s.exercises.forEach((ex,i)=>{
      const key=`${id}_${i}`,dis=!!S.disabledExos[key];
      exoH+=`<div class="exo-row${dis?' dis':''}" id="exo_${key}">
        <div class="exo-txt"><div class="exo-n">${ex.n}</div><div class="exo-d">${ex.d}</div></div>
        <button class="exo-tog${dis?' on':''}" onclick="togExo('${key}')" title="${dis?'Réactiver':'Désactiver'}">${dis?'↺':'✕'}</button>

  }
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-tag" style="background:${T.bg};color:${T.col};border:1px solid ${T.brd}">${T.icon} ${T.label}</div>

    ${exoH}
    <div class="m-actions">
      <button class="${done?'btn-p btn-done-s':'btn-p'}" onclick="togDone('${id}')">${done?'✓ Fait — annuler':'Marquer fait'}</button>
      <button class="btn-s" onclick="openMove('${id}')">↔ Déplacer</button>
      ${isCust?`<button class="btn-d" onclick="delCust('${id}')">🗑</button>`:''}
    </div>`);
}

function togDone(id){
  S.done[id]=!S.done[id];saveS();renderHdr();closeModal();
  if(!document.getElementById('tab-plan').hidden)renderCal();
}

function togExo(key){
  S.disabledExos[key]=!S.disabledExos[key];saveS();
  const row=document.getElementById(`exo_${key}`);
  if(row){
    row.classList.toggle('dis',!!S.disabledExos[key]);

    if(b){b.classList.toggle('on',!!S.disabledExos[key]);b.textContent=S.disabledExos[key]?'↺':'✕';}

}

      </div>
      <input type="number" step="0.1" min="50" max="150"
        class="wt-inp${isCur?' cur':''}" placeholder="— kg" value="${rec||''}"
        onchange="saveWt(${w.n},this.value)">
      ${rec?`<div style="font-size:12px;color:${rec<=TARGET_KG?'var(--grn)':rec<79?'var(--gld)':'var(--t2)'}">${rec} kg${rec<=TARGET_KG?' ✓':''}</div>`:''}
    </div>`;
  }).join('');

  let h=`
    <p style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px">Pesée hebdomadaire</p>
    <p style="font-size:12px;color:var(--t2);font-style:italic;line-height:1.6;margin-bottom:16px">Pèse-toi le lundi matin à jeun, toujours dans les mêmes conditions.</p>
    ${rows}
    <div class="chart-wrap">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Courbe de poids</div>
      <canvas id="wc" height="160"></canvas>
    </div>`;

  if(S.ecarts.length>0){
    h+=`<div class="sec-title" style="margin-top:20px">Historique des écarts</div>`;
    S.ecarts.slice().reverse().forEach(e=>{
      h+=`<div class="ecart-row"><span style="color:var(--red)">${e.type}${e.note?` — ${e.note}`:''}</span><span style="font-size:11px;color:var(--t3)">${e.date}</span></div>`;
    });
  }
  h+=`<button class="ecart-btn" onclick="openEcart()">⚠ Signaler un écart alimentaire</button>`;
  document.getElementById('tab-poids').innerHTML=h;
  renderWtChart();
}

function saveWt(wk,val){
  const v=parseFloat(val);
  if(!isNaN(v)&&v>40&&v<200){S.weights[wk]=v;saveS();renderHdr();renderWtChart();}
}

function renderWtChart(){
  const canvas=document.getElementById('wc');if(!canvas)return;
  if(wtChart){wtChart.destroy();wtChart=null;}
  const data=WEEKS.map(w=>S.weights[w.n]||null);
  wtChart=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{
      labels:WEEKS.map(w=>`S${w.n}`),
      datasets:[
        {label:'Poids',data,borderColor:'#1A1A1A',borderWidth:2,pointBackgroundColor:'#1A1A1A',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5,tension:.3,spanGaps:false},
        {label:`Objectif ${TARGET_KG} kg`,data:Array(7).fill(TARGET_KG),borderColor:'#2E7D5A',borderWidth:1,borderDash:[4,4],pointRadius:0},
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y??'—'} kg`}}},
      scales:{y:{ticks:{callback:v=>`${v}kg`}}}
    }
  });
}

/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded',()=>{
  loadS();
  if(!S.currentWeek||S.currentWeek<1)S.currentWeek=getCurrentWeek();
  renderHdr();
  switchTab('plan');
});
</script>
</body>
