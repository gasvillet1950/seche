<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sèche 2026">
<title>Sèche Été 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F9F7F3;--card:#FFF;--brd:#DDD8CF;--brdL:#EDE8E1;
  --t:#1A1A1A;--t2:#5C5650;--t3:#9B9590;
  --grn:#2E7D5A;--grnBg:#F0F8F4;--grnBrd:#B8D9CB;
  --red:#B83A2A;--redBg:#FDF2F0;--redBrd:#EAB5AC;
  --gld:#8B6914;--gldBg:#FDF8EC;--gldBrd:#DCC87A;
  --blu:#2B5EA7;--bluBg:#F0F4FB;--bluBrd:#B0C4E8;
  --ora:#C05E1A;--oraBg:#FDF4EC;--oraBrd:#F0C8A0;
  --f:Georgia,'Times New Roman',serif;
}
body.dim{--bg:#F0EDE7;--card:#F7F4EF;--brdL:#E0DAD0;}
*{box-sizing:border-box;margin:0;padding:0;}
[hidden]{display:none!important;}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;transition:background .4s;}
button{font-family:var(--f);cursor:pointer;border:none;}
#app{max-width:960px;margin:0 auto;padding-bottom:50px;}

/* HEADER */
#hdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);}
.hdr-tiny{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.hdr-h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px;}
.hdr-sub{font-size:12px;color:var(--t2);margin-bottom:12px;}
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-bg{flex:1;height:3px;background:var(--brdL);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--grn),var(--blu));border-radius:2px;}
.prog-lbl{font-size:10px;color:var(--t3);white-space:nowrap;}
.stats{display:flex;gap:6px;}
.stat{flex:1;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:8px 4px;text-align:center;}
.stat-n{font-size:18px;font-weight:700;line-height:1;}
.stat-l{font-size:9px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}

/* TABS */
#tabs{display:flex;padding:12px 20px 0;gap:1px;border-bottom:1px solid var(--brd);overflow-x:auto;}
.tbtn{flex:1;min-width:70px;padding:7px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:11px;letter-spacing:.02em;transition:all .15s;white-space:nowrap;}
.tbtn.active{color:var(--grn);border-bottom-color:var(--grn);font-weight:700;}
#content{padding:14px 20px;}

/* TODAY TAB */
.today-banner{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.today-date-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}
.today-date-val{font-size:16px;font-weight:700;letter-spacing:-.01em;}
.today-date-sub{font-size:12px;color:var(--t3);margin-top:2px;font-style:italic;}

/* SUGAR COUNTER */
.sugar-box{background:var(--card);border:2px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:12px;text-align:center;transition:border-color .3s,background .3s;}
.sugar-box.s0{border-color:var(--grnBrd);background:var(--grnBg);}
.sugar-box.s1{border-color:var(--gldBrd);background:var(--gldBg);}
.sugar-box.s2{border-color:var(--oraBrd);background:var(--oraBg);}
.sugar-box.s3{border-color:var(--redBrd);background:var(--redBg);}
.sugar-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t2);margin-bottom:8px;}
.sugar-num{font-size:48px;font-weight:700;line-height:1;margin:6px 0;}
.sugar-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px;}
.sugar-btn{width:40px;height:40px;border-radius:50%;background:var(--card);border:1.5px solid var(--brd);font-size:20px;color:var(--t2);display:flex;align-items:center;justify-content:center;}
.sugar-msg{font-size:13px;font-weight:700;}
.sugar-msg.s0{color:var(--grn);}
.sugar-msg.s1{color:var(--gld);}
.sugar-msg.s2{color:var(--ora);}
.sugar-msg.s3{color:var(--red);}

/* MEAL LOG */
.meal-box{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.meal-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:10px;}
.meal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.meal-slot{font-size:12px;font-weight:700;color:var(--t2);width:36px;flex-shrink:0;}
.meal-btns{display:flex;gap:5px;flex:1;}
.meal-btn{flex:1;padding:6px 4px;border-radius:7px;border:1.5px solid var(--brd);background:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all .15s;text-align:center;}
.meal-btn.sel-propre{border-color:var(--grn);background:var(--grnBg);color:var(--grn);}
.meal-btn.sel-correct{border-color:var(--gld);background:var(--gldBg);color:var(--gld);}
.meal-btn.sel-gras{border-color:var(--ora);background:var(--oraBg);color:var(--ora);}
.meal-btn.sel-ecart{border-color:var(--red);background:var(--redBg);color:var(--red);}

/* WEEK SNAPSHOT */
.snapshot{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.snapshot-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:10px;}
.snapshot-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--brdL);font-size:13px;}
.snapshot-row:last-child{border-bottom:none;}
.snap-val{font-weight:700;}

/* SCORE */
.score-box{display:flex;align-items:center;gap:10px;padding:10px 0;}
.score-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.score-detail{flex:1;}
.score-msg{font-size:13px;font-weight:700;margin-bottom:3px;}
.score-sub{font-size:11px;color:var(--t2);line-height:1.5;}

/* WEEK NAV */
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wknav-btn{background:none;border:1px solid var(--brd);border-radius:6px;width:34px;height:34px;color:var(--t2);font-size:20px;display:flex;align-items:center;justify-content:center;}
.wknav-btn:disabled{color:var(--brdL);cursor:default;}
.wknav-c{text-align:center;}
.wknav-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;}
.wknav-theme{font-size:16px;font-weight:700;letter-spacing:-.01em;margin:3px 0 2px;}
.wknav-dates{font-size:11px;color:var(--t3);}
.wk-badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;margin-left:5px;}
.wk-badge.cur{background:var(--grn);color:#fff;}
.wk-badge.past{background:var(--brdL);color:var(--t3);}
.wk-alert{background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;padding:9px 14px;margin-bottom:12px;font-size:12px;color:var(--red);}

/* CALENDAR */
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--brd);border-radius:10px;background:var(--card);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(106px,1fr));min-width:742px;}
.day-col{border-right:1px solid var(--brdL);min-height:220px;display:flex;flex-direction:column;transition:background .15s;}
.day-col:last-child{border-right:none;}
.day-col.drag-over{background:var(--grnBg)!important;}
.day-hdr{padding:8px 6px;background:var(--bg);border-bottom:1px solid var(--brdL);text-align:center;flex-shrink:0;}
.day-hdr-name{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);display:block;}
.day-hdr-num{font-size:17px;font-weight:700;color:var(--t2);line-height:1.2;}
.day-col.is-today .day-hdr{background:var(--grnBg);}
.day-col.is-today .day-hdr-name,.day-col.is-today .day-hdr-num{color:var(--grn);}
.today-dot{display:block;width:5px;height:5px;background:var(--grn);border-radius:50%;margin:2px auto 0;}
.day-body{flex:1;padding:5px;display:flex;flex-direction:column;gap:5px;}
.sb{border-radius:6px;padding:6px 8px;cursor:pointer;border-left:3px solid;font-size:11px;position:relative;user-select:none;transition:filter .15s;}
.sb:hover{filter:brightness(.95);}
.sb.is-done{opacity:.55;}
.sb.is-dragging{opacity:.3;}
.sb-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.85;margin-bottom:2px;}
.sb-title{font-size:11px;font-weight:700;line-height:1.25;margin-bottom:1px;}
.sb-dur{font-size:10px;opacity:.7;}
.sb-check{position:absolute;top:5px;right:6px;font-size:11px;font-weight:700;color:var(--grn);}
.sb.tp-muscu{background:var(--grnBg);border-color:var(--grn);color:var(--grn);}
.sb.tp-velo{background:var(--bluBg);border-color:var(--blu);color:var(--blu);}
.sb.tp-combo{background:#FDF6F1;border-color:#7A4E2D;color:#7A4E2D;}
.sb.tp-optional{background:var(--gldBg);border-color:var(--gld);color:var(--gld);}
.sb.tp-foot{background:#FDF4EC;border-color:#C05E1A;color:#C05E1A;}
.sb.tp-run{background:#EBF8F8;border-color:#1A7A7A;color:#1A7A7A;}
.sb.tp-tennis{background:#F4F0F8;border-color:#5A2E7D;color:#5A2E7D;}
.add-day-btn{margin-top:auto;padding:5px;background:none;border:1px dashed var(--brd);border-radius:5px;color:var(--t3);font-size:14px;width:100%;transition:all .15s;}
.add-day-btn:hover{border-color:var(--grn);color:var(--grn);background:var(--grnBg);}
.ecart-btn{width:100%;margin-top:12px;padding:10px;background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;color:var(--red);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;}

/* KCAL TAB */
.kcal-hero{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:12px;}
.kcal-hero-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:10px;}
.kcal-bars{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.kcal-bar-row{display:flex;align-items:center;gap:8px;}
.kcal-bar-lbl{font-size:11px;color:var(--t2);width:80px;flex-shrink:0;}
.kcal-bar-bg{flex:1;height:8px;background:var(--brdL);border-radius:4px;overflow:hidden;}
.kcal-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.kcal-bar-val{font-size:11px;font-weight:700;width:60px;text-align:right;flex-shrink:0;}
.kcal-balance{padding-top:12px;border-top:1px solid var(--brdL);display:flex;justify-content:space-between;align-items:center;}
.kcal-balance-lbl{font-size:12px;color:var(--t2);}
.kcal-balance-val{font-size:18px;font-weight:700;}
.next-week-box{background:var(--bluBg);border:1px solid var(--bluBrd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.next-week-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--blu);margin-bottom:8px;}
.next-week-msg{font-size:13px;color:var(--t);line-height:1.7;}
.kcal-breakdown{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.bd-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brdL);font-size:13px;}
.bd-row:last-child{border-bottom:none;}

/* WEIGHT TAB */
.wt-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brdL);}
.wt-wk{width:60px;flex-shrink:0;}
.wt-wk-n{font-size:12px;font-weight:700;}
.wt-wk-d{font-size:10px;color:var(--t3);}
.wt-wk-tgt{font-size:9px;color:var(--blu);margin-top:1px;}
.wt-inp{width:76px;padding:7px 8px;border:1px solid var(--brd);border-radius:6px;font-size:13px;font-family:var(--f);outline:none;}
.wt-inp.cur{border-color:var(--grnBrd);background:var(--grnBg);}
.wt-trend{font-size:13px;margin-left:2px;}
.chart-wrap{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:16px 8px 8px;margin-top:16px;}
.ecart-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--brdL);font-size:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0 0 12px;}
@media(min-width:600px){.overlay{align-items:center;}}
#mbox{background:#fff;border-radius:14px 14px 10px 10px;padding:22px;width:93%;max-width:490px;max-height:88vh;overflow-y:auto;border:1px solid var(--brd);}
@media(min-width:600px){#mbox{border-radius:12px;}}
.m-close{float:right;background:none;font-size:22px;color:var(--t3);margin-top:-4px;line-height:1;}
.m-title{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--t);}
.m-tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.m-sess-title{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.2;}
.m-date-row{display:flex;gap:14px;align-items:center;margin-bottom:12px;font-size:12px;color:var(--t2);}
.m-date-link{color:var(--blu);text-decoration:underline;text-decoration-style:dotted;cursor:pointer;}
.velo-blk{background:var(--bluBg);border:1px solid var(--bluBrd);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--blu);font-style:italic;margin-bottom:10px;}
.exo-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 6px;}
.exo-list{margin-bottom:10px;}
.exo-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--brdL);gap:8px;}
.exo-row.dis .exo-txt{text-decoration:line-through;opacity:.4;}
.exo-txt{flex:1;}
.exo-n{font-size:12px;font-weight:700;color:var(--t);margin-bottom:1px;}
.exo-d{font-size:11px;color:var(--t2);font-style:italic;}
.exo-tog{background:none;border:1px solid var(--brd);border-radius:5px;width:26px;height:26px;font-size:11px;color:var(--t3);flex-shrink:0;}
.exo-tog.on{border-color:var(--red);color:var(--red);}

/* TIMER */
.timer-wrap{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.timer-display{font-size:22px;font-weight:700;letter-spacing:.05em;font-variant-numeric:tabular-nums;color:var(--t);}
.timer-btn{padding:6px 14px;border-radius:6px;background:var(--grn);color:#fff;font-size:12px;font-weight:700;}
.timer-btn.stop{background:var(--red);}
.timer-reset{padding:6px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--brd);color:var(--t2);font-size:12px;}

/* NOTES */
.notes-wrap{margin:10px 0;}
.notes-inp{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:7px;font-size:12px;font-family:var(--f);color:var(--t);outline:none;resize:vertical;min-height:60px;}

.m-actions{display:flex;gap:8px;margin-top:14px;}
.btn-p{flex:1;padding:11px;background:var(--grn);border-radius:8px;color:#fff;font-size:13px;font-weight:700;}
.btn-s{padding:11px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--t2);font-size:13px;}
.btn-d{padding:11px;background:var(--redBg);border:1px solid var(--redBrd);border-radius:8px;color:var(--red);font-size:13px;}
.btn-done-s{background:var(--grnBg)!important;border:1px solid var(--grnBrd);color:var(--grn)!important;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0;}
.type-btn{padding:10px 5px;border-radius:8px;border:1.5px solid var(--brd);background:#fff;font-size:10px;text-align:center;cursor:pointer;transition:all .15s;line-height:1.3;}
.type-btn .ti{font-size:20px;display:block;margin-bottom:3px;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0;}
.dpk{padding:7px 3px;border-radius:6px;border:1px solid var(--brd);background:#fff;font-size:9px;text-align:center;cursor:pointer;color:var(--t2);}
.dpk.sel{border-color:var(--grn);background:var(--grnBg);color:var(--grn);font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 14px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--brd);background:#fff;color:var(--t2);font-size:12px;cursor:pointer;}
.chip.sel{border-color:var(--red);background:var(--redBg);color:var(--red);}
.minp{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:7px;font-size:13px;font-family:var(--f);color:var(--t);outline:none;}
.lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;display:block;}
.sec-title{font-size:10px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin:18px 0 10px;}
.n-card{border-radius:9px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.65;}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <nav id="tabs">
    <button class="tbtn" id="tbtn-today"  onclick="switchTab('today')">Aujourd'hui</button>
    <button class="tbtn" id="tbtn-plan"   onclick="switchTab('plan')">Planning</button>
    <button class="tbtn" id="tbtn-kcal"   onclick="switchTab('kcal')">Calories</button>
    <button class="tbtn" id="tbtn-nutri"  onclick="switchTab('nutri')">Nutrition</button>
    <button class="tbtn" id="tbtn-poids"  onclick="switchTab('poids')">Poids</button>
  </nav>
  <div id="content">
    <div id="tab-today"></div>
    <div id="tab-plan"  hidden></div>
    <div id="tab-kcal"  hidden></div>
    <div id="tab-nutri" hidden></div>
    <div id="tab-poids" hidden></div>
  </div>
</div>
<div id="modal" class="overlay" hidden onclick="if(event.target===this)closeModal()">
  <div id="mbox"></div>
</div>
<script>
/* ══ CONSTANTS ══ */
const PROG_START=new Date(2026,4,25); // Lundi 25 mai
const PROG_END=new Date(2026,6,14);
const TOTAL_DAYS=Math.round((PROG_END-PROG_START)/86400000);
const TARGET_KG=75;
const TDEE=2900;       // kcal/j maintenance
const DAILY_TARGET=2400; // kcal/j objectif (déficit ~500)
const WEEKLY_TARGET=DAILY_TARGET*7;

const TODAY=(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();

const TYPES={
  muscu:  {icon:'💪',label:'Musculation',col:'#2E7D5A',bg:'#F0F8F4',brd:'#B8D9CB',burn:220},
  velo:   {icon:'🚴',label:'Cardio Vélo',col:'#2B5EA7',bg:'#F0F4FB',brd:'#B0C4E8',burn:280},
  combo:  {icon:'⚡',label:'Combo',      col:'#7A4E2D',bg:'#FDF6F1',brd:'#E8C8A8',burn:450},
  optional:{icon:'⭐',label:'Bonus',     col:'#8B6914',bg:'#FDF8EC',brd:'#DCC87A',burn:150},
  foot:   {icon:'⚽',label:'Football',   col:'#C05E1A',bg:'#FDF4EC',brd:'#F0C8A0',burn:550},
  run:    {icon:'🏃',label:'Course',     col:'#1A7A7A',bg:'#EBF8F8',brd:'#A0D8D8',burn:320},
  tennis: {icon:'🎾',label:'Tennis',     col:'#5A2E7D',bg:'#F4F0F8',brd:'#C8B0E0',burn:400},
};

const ECART_KCAL={
  'Boisson sucrée':250,'Gâteau / dessert':350,'Frites':400,
  'Session ratée':0,'Alcool en semaine':500,'Portion excessive':300,'Grignotage':200,
};

const MEAL_KCAL={propre:0,correct:200,gras:500,ecart:700};

const WEEKS=[

/* ══ HELPERS ══ */
function toYMD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(ymd){if(!ymd)return '—';const d=new Date(ymd+'T12:00:00');return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateLong(d){return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

function getCurrentWeek(){
  const diff=Math.floor((new Date()-PROG_START)/86400000);
  if(diff<0)return 1;
  return Math.min(Math.floor(diff/7)+1,7);
}

function getWeekDates(wn){
  const start=new Date(PROG_START);
  start.setDate(start.getDate()+(wn-1)*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+i);return d;});
}

/* ══ CALORIE CALCULATIONS ══ */
function getWeekDateRange(wn){
  const dates=getWeekDates(wn);
  return dates.map(d=>toYMD(d));
}

function calcWeekKcal(wn){
  const range=getWeekDateRange(wn);
  // Écarts penalty
  const ecartsThisWeek=S.ecarts.filter(e=>range.includes(e.date));
  const ecartKcal=ecartsThisWeek.reduce((a,e)=>a+(ECART_KCAL[e.type]||0),0);
  // Sessions burn
  const sessThisWeek=S.customSessions.filter(s=>range.includes(s.date)&&S.done[s.id]);
  const burnKcal=sessThisWeek.reduce((a,s)=>a+(TYPES[s.type]?.burn||200),0);
  // Meal surplus
  const mealSurplus=range.reduce((a,ds)=>{
    const m=S.meals[ds]||{};
    return a+(MEAL_KCAL[m.midi]||0)+(MEAL_KCAL[m.soir]||0);
  },0);
  // Sugar penalty (beyond 1/day)
  const sugarPenalty=range.reduce((a,ds)=>{
    const cnt=S.sugarDrinks[ds]||0;
    return a+(Math.max(0,cnt-1)*250);
  },0);
  const totalOverage=ecartKcal+mealSurplus+sugarPenalty;
  const netBalance=burnKcal-totalOverage; // positive = good (burned more than added)
  return {ecartKcal,burnKcal,mealSurplus,sugarPenalty,totalOverage,netBalance,sessCount:sessThisWeek.length};
}

function getWeekScore(wn){
  const range=getWeekDateRange(wn);
  const {ecartKcal,burnKcal,netBalance}=calcWeekKcal(wn);
  const sessThisWeek=S.customSessions.filter(s=>range.includes(s.date)&&S.done[s.id]).length;
  const ecartsCount=S.ecarts.filter(e=>range.includes(e.date)).length;
  // Score /10
  let score=6;
  score+=Math.min(3,sessThisWeek); // +1 per session, max +3
  score-=Math.min(3,Math.floor(ecartsCount/2)*0.5); // -0.5 per 2 écarts
  // Weight trend
  const wt=S.weights[wn],prev=S.weights[wn-1];
  if(wt&&prev){if(wt<prev)score+=0.5;else if(wt>prev)score-=0.5;}
  // Sugar
  const avgSugar=range.reduce((a,ds)=>a+(S.sugarDrinks[ds]||0),0)/7;
  if(avgSugar<=0.5)score+=0.5;
  else if(avgSugar>2)score-=1;
  return Math.max(0,Math.min(10,Math.round(score*10)/10));
}

function getNextWeekGoal(wn){
  const curWt=S.weights[wn],prevWt=S.weights[Math.max(1,wn-1)];
  const score=getWeekScore(wn);
  const {netBalance}=calcWeekKcal(wn);
  let lines=[];
  if(!curWt){
    lines.push('Pèse-toi lundi pour que je puisse calibrer la semaine suivante.');
    lines.push('Objectif conservateur : 0 boisson sucrée, 3 repas propres minimum.');
    return lines;
  }
  const lost=prevWt?prevWt-curWt:0;
  if(lost>1){
    lines.push(`Tu as perdu ${lost.toFixed(1)} kg — c'est trop rapide. Ça brûle du muscle.`);
    lines.push('Ajoute 200 kcal/j la semaine prochaine : une portion de riz en plus le soir.');
  } else if(lost>=0.3&&lost<=1){
    lines.push(`Perte de ${lost.toFixed(1)} kg — rythme parfait. Ne change rien.`);
    lines.push('Maintiens la même approche, surveille les boissons sucrées.');
  } else if(lost>=0&&lost<0.3){
    lines.push('Perte inférieure à 300g — insuffisant pour l\'objectif.');
    lines.push('Supprime un écart par jour, ou ajoute une séance cardio de 30 min.');
  } else {
    lines.push(`Tu as pris ${Math.abs(lost).toFixed(1)} kg — semaine critique.`);
    lines.push('Semaine prochaine : zéro boisson sucrée, zéro dessert, 2 séances minimum.');
  }
  if(score<5)lines.push('Score faible — reprends les bases avant d\'augmenter l\'intensité.');
  if(curWt>0){
    const weeksLeft=7-wn;
    const kgLeft=curWt-TARGET_KG;
    if(weeksLeft>0&&kgLeft>0){
      const kgPerWeek=(kgLeft/weeksLeft).toFixed(1);
      lines.push(`Il reste ${kgLeft.toFixed(1)} kg en ${weeksLeft} semaine(s) → ${kgPerWeek} kg/semaine nécessaires.`);
    } else if(kgLeft<=0){
      lines.push('Objectif atteint ✓ — passe en mode maintien.');
    }
  }
  return lines;
}

function getStreak(){
  let streak=0;
  const d=new Date();
  for(let i=0;i<30;i++){
    const ds=toYMD(d);
    const ecarts=S.ecarts.filter(e=>e.date===ds).length;
    const sugar=S.sugarDrinks[ds]||0;
    const clean=ecarts<=1&&sugar<=1;
    if(clean)streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

    <div class="cal-scroll"><div class="cal-grid">`;

  dates.forEach(date=>{
    const ds=toYMD(date),isToday=ds===TODAY;
    const beforeProg=new Date(ds+'T12:00:00')<PROG_START;
    const dn=date.toLocaleDateString('fr-FR',{weekday:'short'}),num=date.getDate();
    const sessions=getSessions4Date(ds);
    h+=`<div class="day-col${isToday?' is-today':''}"
      ondragover="onDO(event,'${ds}')" ondragleave="onDL(event)" ondrop="onDrop(event,'${ds}')"
      data-date="${ds}" style="${beforeProg?'opacity:.45':''}">
      <div class="day-hdr">
        <span class="day-hdr-name">${dn}</span>
        <span class="day-hdr-num">${num}</span>
        ${isToday?'<span class="today-dot"></span>':''}
      </div>
      <div class="day-body">`;
    sessions.forEach(s=>{
      const T=TYPES[s.type]||TYPES.muscu,done=!!S.done[s.id];
      h+=`<div class="sb tp-${s.type}${done?' is-done':''}"
        draggable="true" ondragstart="onDS(event,'${s.id}')" ondragend="onDE()"
        onclick="openSess('${s.id}')" data-id="${s.id}">
        <div class="sb-type">${T.icon} ${T.label}</div>
        <div class="sb-title">${s.title}</div>
        <div class="sb-dur">${s.dur||'?'} min</div>
        ${done?'<div class="sb-check">✓</div>':''}
      </div>`;
    });
    h+=`<button class="add-day-btn" onclick="openAdd('${ds}')">+</button></div></div>`;
  });

  h+=`</div></div><button class="ecart-btn" onclick="openEcart()">⚠ Signaler un écart alimentaire</button>`;
  document.getElementById('tab-plan').innerHTML=h;
}

/* ══ SESSION MODAL ══ */
let timerSec=0,timerInt=null,timerOn=false;

function openSess(id){
  const s=findSess(id);if(!s)return;
  const T=TYPES[s.type]||TYPES.muscu,done=!!S.done[id],sd=getSD(id);
  const note=S.sessionNotes[id]||'';
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-tag" style="background:${T.bg};color:${T.col};border:1px solid ${T.brd}">${T.icon} ${T.label}</div>
    <div class="m-sess-title">${s.title}</div>
    <div class="m-date-row">
      <span class="m-date-link" onclick="openDP('${id}')">${fmtDate(sd)||'Date non définie'}</span>
      <span style="display:flex;align-items:center;gap:4px">
        <input type="number" value="${s.dur||''}" min="5" max="300" placeholder="?" 
          style="width:52px;padding:3px 7px;border:1px solid var(--brd);border-radius:5px;font-size:13px;font-family:var(--f);outline:none"
          onchange="saveDur('${id}',this.value)"> min
      </span>
    </div>
    ${s.velo?`<div class="velo-blk">🚴 ${s.velo}</div>`:''}
    <div class="timer-wrap">
      <div class="timer-display" id="timer-disp">00:00</div>
      <button class="timer-btn" id="timer-tog-btn" onclick="toggleTimer()">▶ Start</button>
      <button class="timer-reset" onclick="resetTimer()">↺</button>
    </div>
    <div class="notes-wrap">
      <span class="lbl">Notes de séance</span>
      <textarea class="notes-inp" id="sess-note-inp" placeholder="Comment ça s'est passé ? Poids soulevés, ressenti…" onchange="saveNote('${id}',this.value)">${note}</textarea>
    </div>
    <div class="m-actions">
      <button class="${done?'btn-p btn-done-s':'btn-p'}" onclick="togDone('${id}')">${done?'✓ Fait — annuler':'Marquer fait'}</button>
      <button class="btn-s" onclick="openMove('${id}')">↔ Déplacer</button>
      <button class="btn-d" onclick="delCust('${id}')">🗑</button>
    </div>`);
}

function togDone(id){
  S.done[id]=!S.done[id];saveS();renderHdr();
  closeModal();
  if(!document.getElementById('tab-plan').hidden)renderCal();
  if(!document.getElementById('tab-today').hidden)renderToday();
}

function saveDur(id,val){
  const v=parseInt(val);if(!isNaN(v)&&v>4){const s=findSess(id);if(s){s.dur=v;saveS();}}
}

function saveNote(id,val){S.sessionNotes[id]=val;saveS();}

function toggleTimer(){
  timerOn=!timerOn;
  const btn=document.getElementById('timer-tog-btn');
  if(timerOn){
    timerInt=setInterval(()=>{
      timerSec++;
      const el=document.getElementById('timer-disp');
      if(el)el.textContent=`${String(Math.floor(timerSec/60)).padStart(2,'0')}:${String(timerSec%60).padStart(2,'0')}`;
    },1000);
    if(btn){btn.textContent='⏸ Stop';btn.classList.add('stop');}
  } else {
    clearInterval(timerInt);
    if(btn){btn.textContent='▶ Start';btn.classList.remove('stop');}
  }
}

function resetTimer(){
  clearInterval(timerInt);timerOn=false;timerSec=0;
  const el=document.getElementById('timer-disp');if(el)el.textContent='00:00';
  const btn=document.getElementById('timer-tog-btn');if(btn){btn.textContent='▶ Start';btn.classList.remove('stop');}
}

/* ══ DATE / MOVE PICKERS ══ */
function openDP(id){
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-title">Choisir un autre jour</div>
    <input type="date" id="dp" class="minp" value="${getSD(id)||TODAY}" min="2026-05-25" max="2026-07-12">
    <div class="m-actions" style="margin-top:12px">
      <button class="btn-p" onclick="confirmDP('${id}')">Confirmer</button>
      <button class="btn-s" onclick="closeModal()">Annuler</button>
    </div>`);
}
function confirmDP(id){const v=document.getElementById('dp').value;if(v)moveTo(id,v);closeModal();}

function openMove(id){
  const dates=getWeekDates(S.currentWeek),cur=getSD(id);
  const btns=dates.map(d=>{const ds=toYMD(d),lbl=d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'}),sel=ds===cur;
    return `<button class="dpk${sel?' sel':''}" onclick="pickDay('${id}','${ds}')">${lbl}</button>`;
  }).join('');
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-title">Déplacer la séance</div>
    <div class="days-grid">${btns}</div>
    <input type="date" id="mp" class="minp" value="${cur||TODAY}" min="2026-05-25" max="2026-07-12" style="margin-top:10px">
    <div class="m-actions" style="margin-top:12px">
      <button class="btn-p" onclick="pickDay('${id}',document.getElementById('mp').value)">Confirmer</button>
      <button class="btn-s" onclick="closeModal()">Annuler</button>
    </div>`);
}
function pickDay(id,nd){if(nd)moveTo(id,nd);closeModal();}

function delCust(id){
  if(!confirm('Supprimer cette séance ?'))return;
  S.customSessions=S.customSessions.filter(s=>s.id!==id);
  delete S.done[id];delete S.sessionNotes[id];
  saveS();renderCal();if(!document.getElementById('tab-today').hidden)renderToday();closeModal();
}

/* ══ ADD SESSION ══ */
let addDate='',addType='muscu';
function openAdd(ds){addDate=ds;addType='muscu';renderAddM();}

function renderAddM(){
  const tBtns=['muscu','velo','combo','foot','run','tennis','optional'].map(k=>{
    const T=TYPES[k],sel=k===addType;
    return `<button class="type-btn" style="${sel?`border-color:${T.col};background:${T.bg};color:${T.col};border-width:2px`:''}"
      onclick="selAddType('${k}')"><span class="ti">${T.icon}</span>${T.label}</button>`;
  }).join('');
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-title">Ajouter une séance</div>
    <span class="lbl">Type</span>
    <div class="type-grid">${tBtns}</div>
    <span class="lbl" style="margin-top:10px">Titre</span>
    <input id="at" class="minp" placeholder="${TYPES[addType].label}">
    <span class="lbl" style="margin-top:10px">Date</span>
    <input id="ad" type="date" class="minp" value="${addDate}" min="2026-05-25" max="2026-07-12">
    <span class="lbl" style="margin-top:10px">Durée (min)</span>
    <input id="adur" type="number" class="minp" placeholder="60" min="5" max="300">
    <div class="m-actions" style="margin-top:16px">
      <button class="btn-p" onclick="submitAdd()">Ajouter</button>
      <button class="btn-s" onclick="closeModal()">Annuler</button>
    </div>`);
}

function selAddType(t){
  addType=t;
  const pT=document.getElementById('at')?.value||'';
  const pD=document.getElementById('adur')?.value||'';
  const pDt=document.getElementById('ad')?.value||addDate;
  renderAddM();
  const te=document.getElementById('at');if(te)te.value=pT;
  const de=document.getElementById('adur');if(de)de.value=pD;
  const dte=document.getElementById('ad');if(dte)dte.value=pDt;
}

function submitAdd(){
  const title=(document.getElementById('at').value.trim())||TYPES[addType].label;
  const date=document.getElementById('ad').value||addDate;
  const dur=parseInt(document.getElementById('adur').value)||undefined;
  S.customSessions.push({id:'c_'+Date.now(),type:addType,title,date,dur});
  saveS();renderCal();if(!document.getElementById('tab-today').hidden)renderToday();renderHdr();closeModal();
}

/* ══ ÉCART ══ */
let selET=ECART_OPTS[0];
function openEcart(){selET=ECART_OPTS[0];renderEcartM();}
function renderEcartM(){
  const chips=ECART_OPTS.map(o=>`<div class="chip${o===selET?' sel':''}" onclick="selEcartT('${o}')">${o} (≈+${ECART_KCAL[o]||0} kcal)</div>`).join('');
  showM(`
    <button class="m-close" onclick="closeModal()">×</button>
    <div class="m-title">Signaler un écart</div>
    <span class="lbl">Type</span>
    <div class="chips">${chips}</div>
    <span class="lbl">Note (optionnel)</span>
    <input id="en" class="minp" placeholder="Contexte…">
    <div class="m-actions" style="margin-top:14px">
      <button class="btn-p" style="background:#B83A2A" onclick="submitEcart()">Enregistrer</button>
      <button class="btn-s" onclick="closeModal()">Annuler</button>
    </div>`);
}
function selEcartT(t){selET=t;renderEcartM();}
function submitEcart(){
  S.ecarts.push({type:selET,note:document.getElementById('en').value.trim(),date:TODAY});
  saveS();renderHdr();
  if(!document.getElementById('tab-today').hidden)renderToday();
  if(!document.getElementById('tab-kcal').hidden)renderKcal();
  closeModal();
}

/* ══ MODAL ══ */
function showM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('modal').removeAttribute('hidden');}
function closeModal(){document.getElementById('modal').setAttribute('hidden','');clearInterval(timerInt);timerOn=false;timerSec=0;}

/* ══ NAV ══ */
function chWk(d){S.currentWeek=Math.max(1,Math.min(7,S.currentWeek+d));saveS();renderCal();}

function switchTab(id){
  ['today','plan','kcal','nutri','poids'].forEach(t=>{
    document.getElementById(`tab-${t}`).hidden=t!==id;
    const b=document.getElementById(`tbtn-${t}`);if(b)b.classList.toggle('active',t===id);
  });
  if(id==='today')renderToday();
  if(id==='plan')renderCal();
  if(id==='kcal')renderKcal();
  if(id==='nutri')renderNutri();
  if(id==='poids')renderPoids();
}

/* ══ NUTRITION ══ */
function renderNutri(){
  let h=`<div style="background:var(--grnBg);border:1px solid var(--grnBrd);border-radius:10px;padding:14px 16px;margin-bottom:4px">
    <div style="font-size:10px;color:var(--grn);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Logique de la sèche</div>
    <p style="font-size:13px;color:var(--t2);line-height:1.7">Pas de petit-déjeuner = fenêtre de jeûne ~16 h. L'objectif : <strong>éliminer les calories vides</strong> et <strong>contrôler les portions</strong>. Un déficit de 500 kcal/jour avec le sport = −0,5 kg/semaine.</p>
  </div>
  <div class="sec-title">À supprimer</div>`;
  NUTRITION.stop.forEach(r=>{h+=`<div class="n-card" style="background:var(--redBg);border:1px solid var(--redBrd)">
    <div style="font-weight:700;color:var(--red);margin-bottom:4px">${r.item}</div>
    <div style="color:var(--t2);margin-bottom:3px">→ ${r.rep}</div>
    <div style="font-size:10px;color:var(--t3)">Économie : ${r.kcal}</div>
  </div>`;});
  h+=`<div class="sec-title">À réduire</div>`;
  NUTRITION.reduce.forEach(r=>{h+=`<div class="n-card" style="background:var(--gldBg);border:1px solid var(--gldBrd);color:var(--t2)">${r}</div>`;});
  h+=`<div class="sec-title">À conserver</div>`;
  NUTRITION.keep.forEach(r=>{h+=`<div class="n-card" style="background:var(--grnBg);border:1px solid var(--grnBrd);color:var(--t2)">${r}</div>`;});
  h+=`<button class="ecart-btn" onclick="openEcart()">⚠ Signaler un écart alimentaire</button>`;
  document.getElementById('tab-nutri').innerHTML=h;
}

/* ══ POIDS ══ */
let wtChart=null;
function renderPoids(){
  const cw=getCurrentWeek();
  const kgPerWeek=(80-TARGET_KG)/7;
  let rows=WEEKS.map(w=>{
    const isCur=w.n===cw,isPast=w.n<cw,rec=S.weights[w.n];
    const mon=new Date(PROG_START);mon.setDate(mon.getDate()+(w.n-1)*7);
    const monLbl=mon.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    const tgt=(80-kgPerWeek*w.n).toFixed(1);
    const prev=S.weights[w.n-1];
    let trend='';
    if(rec&&prev){trend=rec<prev?'↓':'↑';}
    const trendCol=trend==='↓'?'var(--grn)':'var(--red)';
    return `<div class="wt-row">
      <div class="wt-wk">
        <div class="wt-wk-n" style="color:${isCur?'var(--grn)':isPast?'var(--t)':'var(--t3)'}">${isCur?'● ':''}S.${w.n}</div>
        <div class="wt-wk-d">${monLbl}</div>
        <div class="wt-wk-tgt">Obj. ≤ ${tgt} kg</div>
      </div>
      <input type="number" step="0.1" min="50" max="150"
        class="wt-inp${isCur?' cur':''}" placeholder="— kg" value="${rec||''}"
        onchange="saveWt(${w.n},this.value)">
      ${rec?`<div style="font-size:12px;color:${rec<=parseFloat(tgt)?'var(--grn)':rec<80?'var(--gld)':'var(--red)'}">
        ${rec} kg ${trend?`<span style="color:${trendCol};font-weight:700">${trend}</span>`:''}
        ${rec<=TARGET_KG?' ✓':''}
      </div>`:''}
    </div>`;
  }).join('');

  let h=`
    <p style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px">Pesée hebdomadaire</p>
    <p style="font-size:12px;color:var(--t2);font-style:italic;line-height:1.6;margin-bottom:16px">Lundi matin à jeun, dans les mêmes conditions. L'objectif indicatif par semaine est affiché.</p>
    ${rows}
    <div class="chart-wrap">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Courbe de poids</div>
      <canvas id="wc" height="160"></canvas>
    </div>`;
  if(S.ecarts.length>0){
    h+=`<div class="sec-title" style="margin-top:20px">Historique des écarts</div>`;
    S.ecarts.slice().reverse().forEach(e=>{
      h+=`<div class="ecart-row"><span style="color:var(--red)">${e.type}${e.note?` — ${e.note}`:''} <span style="font-size:10px;color:var(--t3)">(≈+${ECART_KCAL[e.type]||0} kcal)</span></span><span style="font-size:11px;color:var(--t3)">${e.date}</span></div>`;
    });
  }
  h+=`<button class="ecart-btn" onclick="openEcart()">⚠ Signaler un écart alimentaire</button>`;
  document.getElementById('tab-poids').innerHTML=h;
  renderWtChart();
}

function saveWt(wk,val){
  const v=parseFloat(val);
  if(!isNaN(v)&&v>40&&v<200){S.weights[wk]=v;saveS();renderHdr();renderWtChart();}
}

function renderWtChart(){
  const canvas=document.getElementById('wc');if(!canvas)return;
  if(wtChart){wtChart.destroy();wtChart=null;}
  const kpw=(80-TARGET_KG)/7;
  const targets=WEEKS.map(w=>parseFloat((80-kpw*w.n).toFixed(1)));
  wtChart=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{
      labels:WEEKS.map(w=>`S${w.n}`),
      datasets:[
        {label:'Poids',data:WEEKS.map(w=>S.weights[w.n]||null),borderColor:'#1A1A1A',borderWidth:2,pointBackgroundColor:'#1A1A1A',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5,tension:.3,spanGaps:false},
        {label:'Objectif cible',data:targets,borderColor:'#2B5EA7',borderWidth:1,borderDash:[3,3],pointRadius:3,pointBackgroundColor:'#2B5EA7'},
        {label:`Objectif final ${TARGET_KG}kg`,data:Array(7).fill(TARGET_KG),borderColor:'#2E7D5A',borderWidth:1,borderDash:[5,5],pointRadius:0},
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{labels:{font:{family:'Georgia',size:10}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y??'—'} kg`}}},
      scales:{y:{ticks:{callback:v=>`${v}kg`,font:{family:'Georgia'}}}}
    }
  });
}

/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded',()=>{
  loadS();
  applyTheme();
  setInterval(applyTheme,60000);
  if(!S.currentWeek||S.currentWeek<1)S.currentWeek=getCurrentWeek();
  renderHdr();
  switchTab('today');
});
</script>
</body>
</html>
